name: Publish create-looper-app

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: create-looper-app/package-lock.json

      - name: Install
        working-directory: create-looper-app
        run: npm ci

      - name: Publish to npm
        working-directory: create-looper-app
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
