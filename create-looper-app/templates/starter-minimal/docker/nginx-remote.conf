server {
  listen __PORT__;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header Access-Control-Allow-Origin "*" always;

  location / {
    try_files $uri $uri/ =404;
  }

  location ~* \.(js|css|json|svg|woff2?)$ {
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri =404;
  }
}
